<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Sephiria Codex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-title">Sephiria Codex</h1>
        <p class="site-tagline">Weapons &amp; artifacts reference</p>
      </div>
    </header>

    <nav class="tabs" aria-label="Main">
      <button type="button" class="tabs__btn is-active" data-panel="weapons">
        Weapons
      </button>
      <button type="button" class="tabs__btn" data-panel="artifacts">
        Artifacts
      </button>
      <button type="button" class="tabs__btn" data-panel="combo-effects">
        Combo effects
      </button>
    </nav>

    <main class="main">
      <section id="panel-weapons" class="panel is-active" aria-labelledby="weapons-heading">
        <h2 id="weapons-heading" class="visually-hidden">Weapons</h2>
        <div id="weapons-root" class="weapons-root"></div>
      </section>
      <section id="panel-artifacts" class="panel" aria-labelledby="artifacts-heading" hidden>
        <h2 id="artifacts-heading" class="visually-hidden">Artifacts</h2>
        <div
          id="artifact-set-filters"
          class="artifact-set-filters"
          role="toolbar"
          aria-label="Filter by combo set"
        ></div>
        <div id="artifacts-root" class="artifacts-root"></div>
      </section>
      <section id="panel-combo-effects" class="panel" aria-labelledby="combo-effects-heading" hidden>
        <h2 id="combo-effects-heading" class="visually-hidden">Combo effects</h2>
        <div id="combo-effects-root" class="combo-effects-root"></div>
      </section>
    </main>

    <div id="modal" class="modal" hidden>
      <div class="modal__backdrop" data-close-modal></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button type="button" class="modal__close" data-close-modal aria-label="Close">
          ×
        </button>
        <div id="modal-body" class="modal__body"></div>
      </div>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
